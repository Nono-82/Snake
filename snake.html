<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="SNAKE">
<title>SNAKE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#000;height:100%;width:100%;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;font-family:monospace;}
#app{display:flex;flex-direction:column;align-items:center;height:100dvh;padding-top:env(safe-area-inset-top,0px);}
#header{width:100%;max-width:360px;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;}
#title{font-size:22px;font-weight:bold;color:#00ff88;letter-spacing:4px;}
#scores{display:flex;gap:12px;align-items:center;}
.sc{text-align:center;}
.sc-l{font-size:8px;color:#555;letter-spacing:1px;}
.sc-v{font-size:16px;font-weight:bold;color:#00ff88;}
#hv{color:#ffcc00;}
#btnp{background:#111;border:1px solid #333;border-radius:6px;color:#00ff88;font-size:13px;padding:5px 10px;cursor:pointer;}
#wrap{position:relative;border:2px solid #1a3a20;border-radius:4px;flex-shrink:0;}
canvas{display:block;}
#srow{width:100%;max-width:360px;padding:4px 12px;font-size:8px;color:#555;letter-spacing:1px;}
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);gap:14px;z-index:20;}
#ov.H{display:none;}
#ovt{font-size:26px;font-weight:bold;color:#00ff88;letter-spacing:4px;}
#ovs{font-size:10px;color:#555;text-align:center;line-height:1.9;}
#ovsc{font-size:11px;color:#ffcc00;display:none;}
#btngo{padding:12px 28px;background:#001a08;border:2px solid #00ff88;border-radius:4px;color:#00ff88;font-family:monospace;font-size:12px;font-weight:bold;letter-spacing:2px;cursor:pointer;}
#dpad{display:grid;grid-template-areas:". U ." "L C R" ". D .";gap:6px;padding:6px 0;}
.db{width:62px;height:62px;background:#111;border:2px solid #222;border-radius:10px;color:#00ff88;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.db:active{background:#1a2a1a;border-color:#00ff88;}
#dU{grid-area:U;}#dL{grid-area:L;}#dC{grid-area:C;border-radius:50%;color:transparent;}#dR{grid-area:R;}#dD{grid-area:D;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title">SNAKE</div>
    <div id="scores">
      <div class="sc"><div class="sc-l">SCORE</div><div class="sc-v" id="sv">0</div></div>
      <div class="sc"><div class="sc-l">BEST</div><div class="sc-v" id="hv">0</div></div>
      <button id="btnp">⏸</button>
    </div>
  </div>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="ov">
      <div id="ovt">SNAKE</div>
      <div id="ovs">D-pad ou swipe pour jouer<br>Le serpent traverse les murs</div>
      <div id="ovsc" id="ovsc"></div>
      <button id="btngo">▶ JOUER</button>
    </div>
  </div>
  <div id="srow" id="srow">VITESSE: LENT</div>
  <div id="dpad">
    <button class="db" id="dU">▲</button>
    <button class="db" id="dL">◀</button>
    <div class="db" id="dC"></div>
    <button class="db" id="dR">▶</button>
    <button class="db" id="dD">▼</button>
  </div>
</div>
<script>
var COLS=20, ROWS=20;
var cv=document.getElementById('c');
var ct=cv.getContext('2d');

function cellSz(){
  var w=Math.floor(Math.min(window.innerWidth,360)/COLS);
  var h=Math.floor(window.innerHeight*0.50/ROWS);
  return Math.max(12,Math.min(w,h));
}
var C=cellSz();
cv.width=COLS*C;
cv.height=ROWS*C;

var hi=parseInt(localStorage.getItem('snk8'))||0;
document.getElementById('hv').textContent=hi;

// Game state
var snake, dir, nextDir, food, score, speed;
var alive=false, paused=false;
var ticker=null, rafId=0;

function initSnake(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};
  nextDir={x:1,y:0};
  score=0;
  speed=160;
  placeFood();
  updateHUD();
}

function placeFood(){
  var p, ok;
  do {
    p={x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
    ok=true;
    for(var i=0;i<snake.length;i++){
      if(snake[i].x===p.x&&snake[i].y===p.y){ok=false;break;}
    }
  } while(!ok);
  food={x:p.x, y:p.y};
}

function updateHUD(){
  document.getElementById('sv').textContent=score;
  document.getElementById('hv').textContent=hi;
  var names=['LENT','NORMAL','RAPIDE','TURBO','ULTRA'];
  var lv=Math.min(4,Math.floor((160-speed)/25));
  if(lv<0)lv=0;
  document.getElementById('srow').textContent='VITESSE: '+names[lv];
}

// ── Draw — NO gradients, NO shadow, pure flat shapes ──
function draw(){
  // clear
  ct.fillStyle='#050f08';
  ct.fillRect(0,0,cv.width,cv.height);

  // grid
  ct.strokeStyle='rgba(0,80,30,0.3)';
  ct.lineWidth=0.5;
  for(var x=0;x<=COLS;x++){
    ct.beginPath();ct.moveTo(x*C,0);ct.lineTo(x*C,cv.height);ct.stroke();
  }
  for(var y=0;y<=ROWS;y++){
    ct.beginPath();ct.moveTo(0,y*C);ct.lineTo(cv.width,y*C);ct.stroke();
  }

  // food — simple red square, no gradient
  var fx=food.x*C+2, fy=food.y*C+2, fs=C-4;
  ct.fillStyle='#ff3333';
  ct.fillRect(fx,fy,fs,fs);
  // shine
  ct.fillStyle='rgba(255,180,180,0.6)';
  ct.fillRect(fx+2,fy+2,fs/3,fs/3);

  // snake
  for(var i=snake.length-1;i>=0;i--){
    var seg=snake[i];
    var px=seg.x*C+1, py=seg.y*C+1, ps=C-2;
    if(i===0){
      // head — bright green
      ct.fillStyle='#00ff88';
    } else {
      // body — darker toward tail
      var fade=Math.floor(200*(1-i/snake.length));
      ct.fillStyle='rgb(0,'+fade+','+Math.floor(fade/3)+')';
    }
    ct.fillRect(px,py,ps,ps);

    // eyes on head
    if(i===0){
      ct.fillStyle='#000';
      var ex1,ey1,ex2,ey2,es=Math.max(2,Math.floor(C*0.15));
      if(dir.x===1){ex1=seg.x*C+C-es*2;ey1=seg.y*C+3;ex2=ex1;ey2=seg.y*C+C-3-es;}
      else if(dir.x===-1){ex1=seg.x*C+2;ey1=seg.y*C+3;ex2=ex1;ey2=seg.y*C+C-3-es;}
      else if(dir.y===-1){ex1=seg.x*C+3;ey1=seg.y*C+2;ex2=seg.x*C+C-3-es;ey2=ey1;}
      else{ex1=seg.x*C+3;ey1=seg.y*C+C-2-es;ex2=seg.x*C+C-3-es;ey2=ey1;}
      ct.fillRect(ex1,ey1,es,es);
      ct.fillRect(ex2,ey2,es,es);
    }
  }
}

// ── RAF loop — only calls draw() ──
function frame(){
  draw();
  rafId=requestAnimationFrame(frame);
}

// ── Tick — only game logic ──
function tick(){
  if(!alive||paused)return;

  dir.x=nextDir.x;
  dir.y=nextDir.y;

  var hx=(snake[0].x+dir.x+COLS)%COLS;
  var hy=(snake[0].y+dir.y+ROWS)%ROWS;

  // collision with body (exclude last segment — it moves away)
  for(var i=0;i<snake.length-1;i++){
    if(snake[i].x===hx&&snake[i].y===hy){
      die(); return;
    }
  }

  // move
  snake.unshift({x:hx,y:hy});

  // eat?
  if(hx===food.x&&hy===food.y){
    score+=10;
    if(score>hi){hi=score;localStorage.setItem('snk8',hi);}
    updateHUD();
    placeFood();
    // speed up every 50pts
    if(score%50===0){
      speed=Math.max(60,speed-15);
      updateHUD();
      clearInterval(ticker);
      ticker=setInterval(tick,speed);
    }
    // no pop → grows
  } else {
    snake.pop();
  }
}

function die(){
  alive=false;
  clearInterval(ticker);ticker=null;
  setTimeout(function(){
    document.getElementById('ovt').textContent='GAME OVER';
    document.getElementById('ovs').textContent='';
    var osc=document.getElementById('ovsc');
    osc.textContent='SCORE: '+score+'  —  BEST: '+hi;
    osc.style.display='block';
    document.getElementById('btngo').textContent='▶ REJOUER';
    document.getElementById('ov').classList.remove('H');
  },400);
}

function startGame(){
  initSnake();
  alive=true;paused=false;
  document.getElementById('ov').classList.add('H');
  document.getElementById('btnp').textContent='⏸';
  clearInterval(ticker);
  ticker=setInterval(tick,speed);
  cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(frame);
}

function togglePause(){
  if(!alive)return;
  paused=!paused;
  if(paused){
    document.getElementById('btnp').textContent='▶';
  } else {
    document.getElementById('btnp').textContent='⏸';
  }
}

function setDir(dx,dy){
  if(dx===-dir.x&&dy===-dir.y)return;
  nextDir={x:dx,y:dy};
}

document.getElementById('btngo').addEventListener('click',startGame);
document.getElementById('btnp').addEventListener('click',togglePause);
document.getElementById('dU').addEventListener('click',function(){setDir(0,-1);});
document.getElementById('dD').addEventListener('click',function(){setDir(0,1);});
document.getElementById('dL').addEventListener('click',function(){setDir(-1,0);});
document.getElementById('dR').addEventListener('click',function(){setDir(1,0);});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowUp'){e.preventDefault();setDir(0,-1);}
  else if(e.key==='ArrowDown'){e.preventDefault();setDir(0,1);}
  else if(e.key==='ArrowLeft'){e.preventDefault();setDir(-1,0);}
  else if(e.key==='ArrowRight'){e.preventDefault();setDir(1,0);}
  else if(e.key==='Escape')togglePause();
});

var tx=0,ty=0;
cv.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
cv.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx;
  var dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy)){setDir(dx>0?1:-1,0);}
  else{setDir(0,dy>0?1:-1);}
},{passive:true});

window.addEventListener('resize',function(){
  C=cellSz();cv.width=COLS*C;cv.height=ROWS*C;
});

// boot
initSnake();
rafId=requestAnimationFrame(frame);
</script>
</body>
</html>
