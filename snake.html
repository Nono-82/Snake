<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="SNAKE">
<title>SNAKE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --green: #00ff41;
    --green-dim: #00aa2a;
    --green-dark: #003b0f;
    --bg: #0a0f0a;
    --grid: #0d150d;
    --red: #ff3333;
    --amber: #ffb300;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Press Start 2P', monospace;
    height: 100%;
    width: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    gap: 0;
    padding: 0;
  }

  /* CRT scanline effect */
  #app::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT glow vignette */
  #app::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 99;
  }

  /* --- HEADER --- */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 360px;
    padding: 8px 12px 4px;
  }

  #title {
    font-size: 9px;
    color: var(--green);
    text-shadow: 0 0 8px var(--green), 0 0 20px var(--green-dim);
    letter-spacing: 4px;
  }

  #score-box {
    text-align: right;
  }

  .label {
    font-size: 5px;
    color: var(--green-dim);
    letter-spacing: 1px;
  }

  #score {
    font-size: 12px;
    color: var(--green);
    text-shadow: 0 0 8px var(--green);
  }

  /* --- CANVAS CONTAINER --- */
  #canvas-wrap {
    position: relative;
    border: 2px solid var(--green-dim);
    box-shadow:
      0 0 0 1px var(--green-dark),
      0 0 15px rgba(0,255,65,0.2),
      inset 0 0 30px rgba(0,0,0,0.6);
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  /* --- HI SCORE --- */
  #hiscore-row {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 360px;
    padding: 4px 12px 6px;
    font-size: 6px;
    color: var(--green-dim);
  }

  /* --- OVERLAY --- */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,15,10,0.88);
    gap: 16px;
    z-index: 10;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-size: 18px;
    color: var(--green);
    text-shadow: 0 0 12px var(--green), 0 0 30px var(--green-dim);
    animation: blink 1.2s step-end infinite;
    text-align: center;
    line-height: 1.6;
  }

  .overlay-sub {
    font-size: 7px;
    color: var(--green-dim);
    text-align: center;
    line-height: 2.2;
    letter-spacing: 1px;
  }

  .overlay-score {
    font-size: 10px;
    color: var(--amber);
    text-shadow: 0 0 10px var(--amber);
  }

  #btn-start {
    margin-top: 8px;
    padding: 12px 24px;
    background: transparent;
    border: 2px solid var(--green);
    color: var(--green);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    cursor: pointer;
    text-shadow: 0 0 6px var(--green);
    box-shadow: 0 0 10px rgba(0,255,65,0.3);
    letter-spacing: 2px;
    transition: all 0.15s;
  }

  #btn-start:active {
    background: var(--green);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0,255,65,0.7);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* --- D-PAD --- */
  #dpad {
    display: grid;
    grid-template-areas:
      ". up ."
      "left . right"
      ". down .";
    gap: 4px;
    padding: 8px 0 2px;
  }

  .dpad-btn {
    width: 52px;
    height: 52px;
    background: rgba(0,255,65,0.06);
    border: 1.5px solid rgba(0,255,65,0.25);
    border-radius: 6px;
    color: var(--green-dim);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.08s, border-color 0.08s;
  }

  .dpad-btn:active, .dpad-btn.pressed {
    background: rgba(0,255,65,0.18);
    border-color: var(--green);
    color: var(--green);
  }

  #btn-up    { grid-area: up; }
  #btn-left  { grid-area: left; }
  #btn-right { grid-area: right; }
  #btn-down  { grid-area: down; }

  /* --- PAUSE --- */
  #btn-pause {
    position: absolute;
    top: 8px;
    right: 12px;
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--green-dim);
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    padding: 5px 8px;
    cursor: pointer;
    letter-spacing: 1px;
    -webkit-tap-highlight-color: transparent;
  }

  #btn-pause:active { color: var(--green); border-color: var(--green); }

  /* speed badge */
  #speed-badge {
    font-size: 5px;
    color: var(--amber);
    padding: 0 12px 0;
    width: 100%;
    max-width: 360px;
    text-align: left;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <span id="title">SNAKE</span>
    <div id="score-box">
      <div class="label">SCORE</div>
      <div id="score">0</div>
    </div>
    <button id="btn-pause">⏸</button>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div class="overlay-title" id="ov-title">SNAKE</div>
      <div class="overlay-sub" id="ov-sub">
        Appuyez pour commencer<br><br>
        ← ↑ → ↓ ou swipe<br>
        pour déplacer le serpent
      </div>
      <button id="btn-start">JOUER</button>
    </div>
  </div>

  <div id="hiscore-row">
    <span>MEILLEUR</span>
    <span id="hiscore">0</span>
  </div>

  <div id="speed-badge" id="speed-badge"></div>

  <div id="dpad">
    <button class="dpad-btn" id="btn-up">▲</button>
    <button class="dpad-btn" id="btn-left">◀</button>
    <button class="dpad-btn" id="btn-right">▶</button>
    <button class="dpad-btn" id="btn-down">▼</button>
  </div>
</div>

<script>
const COLS = 20, ROWS = 20;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovSub = document.getElementById('ov-sub');
const scoreEl = document.getElementById('score');
const hiscoreEl = document.getElementById('hiscore');
const speedBadge = document.getElementById('speed-badge');

// Responsive cell size
function calcCell() {
  const maxW = Math.min(window.innerWidth, 360);
  const maxH = window.innerHeight * 0.48;
  const byW = Math.floor(maxW / COLS);
  const byH = Math.floor(maxH / ROWS);
  return Math.max(12, Math.min(byW, byH));
}

let CELL = calcCell();
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// Game state
let snake, dir, nextDir, food, score, hiScore, gameLoop, running, paused, speed;

function initGame() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  speed = 150;
  placeFood();
  updateScore();
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function updateScore() {
  scoreEl.textContent = score;
  hiscoreEl.textContent = hiScore || 0;
}

function getSpeedLabel() {
  if (speed >= 150) return 'LENT';
  if (speed >= 100) return 'NORMAL';
  if (speed >= 70)  return 'RAPIDE';
  if (speed >= 50)  return 'TURBO';
  return 'ULTRA';
}

// Drawing
function drawGrid() {
  ctx.fillStyle = '#0a0f0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#0d150d';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x*CELL, 0);
    ctx.lineTo(x*CELL, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y*CELL);
    ctx.lineTo(canvas.width, y*CELL);
    ctx.stroke();
  }
}

function drawFood() {
  const x = food.x * CELL, y = food.y * CELL;
  const pulse = 0.7 + 0.3 * Math.sin(Date.now()/250);
  // Red glow
  ctx.shadowColor = '#ff3333';
  ctx.shadowBlur = 10 * pulse;
  ctx.fillStyle = '#ff3333';
  const pad = CELL * 0.2;
  ctx.fillRect(x + pad, y + pad, CELL - pad*2, CELL - pad*2);
  ctx.shadowBlur = 0;

  // Small dot center
  ctx.fillStyle = '#ffaaaa';
  const cp = CELL * 0.38;
  ctx.fillRect(x + cp, y + cp, CELL*0.24, CELL*0.24);
}

function drawSnake() {
  snake.forEach((seg, i) => {
    const x = seg.x * CELL, y = seg.y * CELL;
    const isHead = i === 0;
    const t = i / snake.length;
    const brightness = isHead ? 1 : (0.85 - t * 0.5);

    const r = Math.floor(0 * brightness);
    const g = Math.floor(255 * brightness);
    const b = Math.floor(65 * brightness);
    ctx.fillStyle = `rgb(${r},${g},${b})`;

    if (isHead) {
      ctx.shadowColor = '#00ff41';
      ctx.shadowBlur = 14;
    } else {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }

    const pad = isHead ? 1 : 2;
    ctx.fillRect(x + pad, y + pad, CELL - pad*2, CELL - pad*2);

    // Head eyes
    if (isHead) {
      ctx.fillStyle = '#001a05';
      ctx.shadowBlur = 0;
      const ey = y + CELL * 0.28;
      const el = x + CELL * 0.22;
      const er = x + CELL * 0.62;
      const es = Math.max(2, CELL * 0.12);
      if (dir.x === 1)  { ctx.fillRect(er, ey,          es, es); ctx.fillRect(er, ey+CELL*0.38, es, es); }
      else if (dir.x===-1){ ctx.fillRect(el, ey,         es, es); ctx.fillRect(el, ey+CELL*0.38, es, es); }
      else if (dir.y===-1){ ctx.fillRect(el, ey,         es, es); ctx.fillRect(er, ey,          es, es); }
      else               { ctx.fillRect(el, ey+CELL*0.38,es, es); ctx.fillRect(er, ey+CELL*0.38,es, es); }
    }
  });
  ctx.shadowBlur = 0;
}

function render() {
  drawGrid();
  drawFood();
  drawSnake();
}

function step() {
  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision (wrap)
  head.x = (head.x + COLS) % COLS;
  head.y = (head.y + ROWS) % ROWS;

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    if (score > (hiScore||0)) {
      hiScore = score;
      localStorage.setItem('snakeHi', hiScore);
    }
    updateScore();
    placeFood();
    // Speed up
    if (score % 50 === 0) speed = Math.max(50, speed - 10);
    speedBadge.textContent = `VITESSE : ${getSpeedLabel()}`;
    restartLoop();
  } else {
    snake.pop();
  }
}

function tick() {
  step();
  render();
}

function restartLoop() {
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, speed);
}

function startGame() {
  initGame();
  overlay.classList.add('hidden');
  running = true;
  paused = false;
  speedBadge.textContent = `VITESSE : ${getSpeedLabel()}`;
  restartLoop();
}

function gameOver() {
  clearInterval(gameLoop);
  running = false;
  // Flash effect
  let flashes = 0;
  const fl = setInterval(() => {
    ctx.fillStyle = flashes%2===0 ? 'rgba(255,0,0,0.15)' : 'transparent';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    if (++flashes > 5) {
      clearInterval(fl);
      render();
      showOverlay('GAME OVER', `SCORE : ${score}\nMEILLEUR : ${hiScore||0}`, 'REJOUER');
    }
  }, 100);
}

function showOverlay(title, sub, btn) {
  ovTitle.textContent = title;
  ovSub.style.whiteSpace = 'pre-line';
  ovSub.innerHTML = sub.replace(/\n/g,'<br>');
  document.getElementById('btn-start').textContent = btn;
  overlay.classList.remove('hidden');
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  if (paused) {
    clearInterval(gameLoop);
    document.getElementById('btn-pause').textContent = '▶';
    ctx.fillStyle = 'rgba(10,15,10,0.6)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = `${CELL}px 'Press Start 2P'`;
    ctx.textAlign = 'center';
    ctx.fillText('PAUSE', canvas.width/2, canvas.height/2);
    ctx.textAlign = 'left';
  } else {
    document.getElementById('btn-pause').textContent = '⏸';
    restartLoop();
  }
}

// Controls
function setDir(dx, dy) {
  if (dx === -dir.x && dy === -dir.y) return; // no reverse
  nextDir = {x:dx, y:dy};
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-pause').addEventListener('click', togglePause);
document.getElementById('btn-up').addEventListener('click', () => setDir(0,-1));
document.getElementById('btn-down').addEventListener('click', () => setDir(0,1));
document.getElementById('btn-left').addEventListener('click', () => setDir(-1,0));
document.getElementById('btn-right').addEventListener('click', () => setDir(1,0));

// Keyboard
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp':    e.preventDefault(); setDir(0,-1); break;
    case 'ArrowDown':  e.preventDefault(); setDir(0,1);  break;
    case 'ArrowLeft':  e.preventDefault(); setDir(-1,0); break;
    case 'ArrowRight': e.preventDefault(); setDir(1,0);  break;
    case 'p': case 'P': case 'Escape': togglePause(); break;
  }
});

// Swipe
let tx0, ty0;
canvas.addEventListener('touchstart', e => {
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, {passive:true});

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) setDir(dx>0?1:-1, 0);
  else setDir(0, dy>0?1:-1);
}, {passive:true});

// Hi score
hiScore = parseInt(localStorage.getItem('snakeHi')) || 0;
hiscoreEl.textContent = hiScore;

// Initial render
drawGrid();
render();

// Resize
window.addEventListener('resize', () => {
  CELL = calcCell();
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
  if (!running) { drawGrid(); render(); }
});
</script>
</body>
</html>
